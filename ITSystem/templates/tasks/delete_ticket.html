{% extends 'base.html' %}

{% block content %}

<div class="card">

    <h1>Delete Ticket</h1>

    <br>

    <p>Are you sure you want to delete this ticket?</p>

    <br>

    <p><strong>{{ ticket.title }}</strong></p>

    <br>

    <form method="POST">

        {% csrf_token %}

        <button type="submit">Delete</button>

    </form>

</div>

{% endblock %}
